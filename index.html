<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phone Recycling Dashboard</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { color: #333; font-size: 1.4rem; font-weight: 500; margin-bottom: 2rem; }
    .counter {
      font-size: 8rem;
      font-weight: 800;
      color: #2ecc71;
      line-height: 1;
    }
    .label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #999;
      margin-top: 0.5rem;
    }
    .recent {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
    }
    .updated { margin-top: 1.5rem; font-size: 0.8rem; color: #bbb; }
  </style>
</head>
<body>
  <h1 id="installation-name">Phone Recycling Drop Box</h1>
  <div class="counter" id="total">—</div>
  <div class="label">phones recycled</div>
  <div class="recent" id="recent"></div>
  <div class="updated" id="updated">Loading...</div>

  <script>
    // ← Replace with your Pi's public IP or domain
    const PI_API = "http://10.72.3.110:5000/api/status";
    const POLL_INTERVAL = 30000; // 30 seconds

    async function fetchStatus() {
      try {
        const resp = await fetch(PI_API);
        const data = await resp.json();
        document.getElementById("total").textContent = data.total;
        document.getElementById("installation-name").textContent = data.installation_name;
        document.getElementById("recent").textContent =
          "Recent: " + data.recent.map(ts => ts.split("T")[0]).join(", ");
        document.getElementById("updated").textContent =
          "Last updated: " + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById("updated").textContent = "Offline — retrying...";
      }
    }

    fetchStatus();
    setInterval(fetchStatus, POLL_INTERVAL);
  </script>
</body>
</html>
